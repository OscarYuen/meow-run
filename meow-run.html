<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Meow Run: Infinite Runner</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Courier New', Courier, monospace; }
        
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: white; background: rgba(0, 0, 0, 0.6);
            padding: 20px; border-radius: 12px;
            pointer-events: none; min-width: 200px; z-index: 10;
        }

        .score-box { border-bottom: 1px solid #555; padding-bottom: 10px; margin-bottom: 10px; }
        #score { font-size: 28px; color: #00ffea; font-weight: bold; }
        #sub-score { font-size: 12px; color: #ffd700; margin-top: 5px; line-height: 1.4; }

        .stamina-container {
            width: 100%;
            height: 10px;
            background-color: #333;
            border-radius: 5px;
            margin-top: 10px;
            overflow: hidden;
            border: 1px solid #555;
        }
        
        #stamina-bar {
            width: 100%;
            height: 100%;
            background-color: #00ff00;
            transition: width 0.1s linear;
        }
        
        #vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.5) 100%);
            pointer-events: none; z-index: 5;
        }
    </style>
</head>
<body>

<div id="vignette"></div>

<div id="ui">
    <div class="score-box">
        <div id="score">0m</div>
        <div id="sub-score">Best: 0m</div>
    </div>
    <div class="stamina-container">
        <div id="stamina-bar"></div>
    </div>
    <div>
        <small>Controls: Arrows / WASD + Space</small>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import * as CANNON from 'cannon-es';

    class MeowRunGame {
        constructor() {
            // Configuration
            this.config = {
                PLAYER_SPEED: 24,
                BOOST_SPEED: 40,
                LATERAL_SPEED: 14,
                JUMP_FORCE: 18,
                GRAVITY: -45,
                STAMINA_MAX: 100,
                STAMINA_DRAIN: 60, // per second
                STAMINA_RECHARGE: 30, // per second
                STAMINA_RECOVERY_THRESHOLD: 30, // Must reach 30% to boost again
                COLORS: {
                    BG: 0x87CEEB,
                    GROUND: 0x66cc66,
                    OBSTACLE_1: 0x8B4513,
                    OBSTACLE_2: 0x555555,
                    CAT: 0xe67e22
                }
            };

            // State
            this.score = 0;
            this.highScore = 0;
            this.keys = { left: false, right: false, jump: false, forward: false };
            this.jumpCount = 0;
            this.maxJumps = 1;
            this.isGrounded = false;
            this.stamina = 100;
            this.isExhausted = false;
            
            // Systems
            this.clock = new THREE.Clock();
            this.mapMeshes = [];
            this.mapBodies = [];

            this.init();
        }

        init() {
            this.initGraphics();
            this.initPhysics();
            this.createPlayer();
            this.createLevel();
            this.initInput();
            this.animate();
        }

        initGraphics() {
            // Scene
            this.scene = new THREE.Scene();
            this.scene.background = new THREE.Color(this.config.COLORS.BG);
            this.scene.fog = new THREE.Fog(this.config.COLORS.BG, 5, 60);

            // Camera
            this.camera = new THREE.PerspectiveCamera(100, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            // Renderer
            this.renderer = new THREE.WebGLRenderer({ antialias: true });
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.shadowMap.enabled = true;
            document.body.appendChild(this.renderer.domElement);

            // Post-Processing / Effects Overlay (Blur & Dizzy Edge)
            this.speedEffectContainer = document.createElement('div');
            this.speedEffectContainer.style.position = 'absolute';
            this.speedEffectContainer.style.top = '0';
            this.speedEffectContainer.style.left = '0';
            this.speedEffectContainer.style.width = '100%';
            this.speedEffectContainer.style.height = '100%';
            this.speedEffectContainer.style.pointerEvents = 'none';
            
            // Mask: Center is transparent (clear), edges are opaque (effect applied)
            const maskStyle = 'radial-gradient(circle, transparent 30%, black 90%)';
            this.speedEffectContainer.style.maskImage = maskStyle;
            this.speedEffectContainer.style.webkitMaskImage = maskStyle;

            // Initial State
            this.speedEffectContainer.style.backdropFilter = 'blur(0px) hue-rotate(0deg)';
            this.speedEffectContainer.style.webkitBackdropFilter = 'blur(0px) hue-rotate(0deg)';
            this.speedEffectContainer.style.transition = 'backdrop-filter 0.2s, -webkit-backdrop-filter 0.2s';
            this.speedEffectContainer.style.zIndex = '4';
            
            document.body.appendChild(this.speedEffectContainer);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            this.scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
            dirLight.position.set(10, 50, 20);
            dirLight.castShadow = true;
            this.scene.add(dirLight);

            // Resize Handler
            window.addEventListener('resize', () => this.handleResize());
        }

        initPhysics() {
            this.world = new CANNON.World();
            this.world.gravity.set(0, this.config.GRAVITY, 0);

            this.matGround = new CANNON.Material();
            this.matCat = new CANNON.Material();
            const contactMat = new CANNON.ContactMaterial(
                this.matGround, 
                this.matCat, 
                { friction: 0.0, restitution: 0.0 }
            );
            this.world.addContactMaterial(contactMat);
        }

        createPlayer() {
            // Physics Body
            this.playerBody = new CANNON.Body({
                mass: 5,
                shape: new CANNON.Sphere(0.4),
                material: this.matCat,
                fixedRotation: true
            });
            this.playerBody.position.set(0, 3, 0);
            this.playerBody.linearDamping = 0.9;
            this.world.addBody(this.playerBody);

            // Collision Event
            this.playerBody.addEventListener('collide', (e) => {
                this.jumpCount = 0; // Reset jumps on any contact
                if (e.contact.ni.dot(new CANNON.Vec3(0, 1, 0)) < -0.5) {
                    this.isGrounded = true;
                }
            });

            // Visual Mesh (Pixel Art Cat)
            this.playerMesh = new THREE.Group();
            this.buildPixelCat();
            this.scene.add(this.playerMesh);
            this.playerMesh.visible = false; // Hide full body model, only showing paws
            this.createFirstPersonPaws();
        }

        createFurTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Base
            ctx.fillStyle = '#e67e22'; // Base orange
            ctx.fillRect(0, 0, 512, 512);
            
            // Fur strands
            for(let i=0; i<20000; i++) {
                const x = Math.random() * 512;
                const y = Math.random() * 512;
                const len = 10 + Math.random() * 15;
                const angle = Math.PI / 2 + (Math.random() - 0.5) * 0.4; // Mostly vertical
                
                // Color variation
                const shade = Math.random();
                if (shade > 0.7) ctx.strokeStyle = '#d35400'; // Darker
                else if (shade > 0.4) ctx.strokeStyle = '#f39c12'; // Lighter
                else ctx.strokeStyle = '#ffffff'; // White hairs
                
                ctx.lineWidth = 1 + Math.random() * 1.5;
                ctx.globalAlpha = 0.6 + Math.random() * 0.4;
                
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x + Math.cos(angle)*len, y + Math.sin(angle)*len);
                ctx.stroke();
            }
            return new THREE.CanvasTexture(canvas);
        }

        createFirstPersonPaws() {
            this.fpPaws = new THREE.Group();
            
            const furTexture = this.createFurTexture();
            const pawMat = new THREE.MeshStandardMaterial({ 
                map: furTexture,
                roughness: 0.8,
                bumpMap: furTexture,
                bumpScale: 0.05
            }); 
            const whiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff });

            const createLeg = () => {
                const legGroup = new THREE.Group();
                
                // Simple paw - just the visible part like in real POV
                // Main paw body
                const pawGeo = new THREE.BoxGeometry(0.08, 0.06, 0.12);
                const paw = new THREE.Mesh(pawGeo, whiteMat);
                paw.position.set(0, 0, 0);
                paw.castShadow = true;
                legGroup.add(paw);

                // Simple toe beans - three front toes
                const toeGeo = new THREE.SphereGeometry(0.025, 8, 8);
                
                const t1 = new THREE.Mesh(toeGeo, whiteMat); 
                t1.scale.set(1, 0.7, 1);
                t1.position.set(-0.03, -0.02, 0.06);
                
                const t2 = new THREE.Mesh(toeGeo, whiteMat); 
                t2.scale.set(1, 0.7, 1);
                t2.position.set(0, -0.02, 0.07);
                
                const t3 = new THREE.Mesh(toeGeo, whiteMat); 
                t3.scale.set(1, 0.7, 1);
                t3.position.set(0.03, -0.02, 0.06);
                
                legGroup.add(t1); legGroup.add(t2); legGroup.add(t3);

                return legGroup;
            }

            this.leftLeg = createLeg();
            // Position paws lower and more forward to be visible like real cat POV
            this.leftLeg.position.set(-0.15, -0.65, -0.5); 
            this.leftLeg.rotation.y = -0.3; // Point outward (left)
            this.fpPaws.add(this.leftLeg);

            this.rightLeg = createLeg();
            this.rightLeg.position.set(0.15, -0.65, -0.5);
            this.rightLeg.rotation.y = 0.3; // Point outward (right)
            this.fpPaws.add(this.rightLeg);
            
            // Whiskers / "Beard" at the top
            this.createWhiskers();

            this.scene.add(this.fpPaws);
        }

        createWhiskers() {
            const whiskerMat = new THREE.LineBasicMaterial({ 
                color: 0xffffff, 
                transparent: true, 
                opacity: 0.3,
                linewidth: 1
            });
            
            // Top "Beard" / Vibrissae
            const leftWhiskers = new THREE.Group();
            const rightWhiskers = new THREE.Group();
            
            for (let i = 0; i < 5; i++) {
                const points = [
                    new THREE.Vector3(0, 0, 0),
                    new THREE.Vector3(0.2 + Math.random() * 0.1, -0.1 - Math.random() * 0.1, -0.3)
                ];
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                const w = new THREE.Line(geo, whiskerMat);
                w.position.y = Math.random() * 0.05;
                w.rotation.z = (Math.random()) * 0.5;
                w.rotation.y = 0.2;
                leftWhiskers.add(w);
            }

            for (let i = 0; i < 5; i++) {
                const points = [
                    new THREE.Vector3(0, 0, 0),
                    new THREE.Vector3(-0.2 - Math.random() * 0.1, -0.1 - Math.random() * 0.1, -0.3)
                ];
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                const w = new THREE.Line(geo, whiskerMat);
                w.position.y = Math.random() * 0.05;
                w.rotation.z = -(Math.random()) * 0.5;
                w.rotation.y = -0.2;
                rightWhiskers.add(w);
            }

            // Position at top corners of view, appearing to come from "eyebrows" or top of head
            leftWhiskers.position.set(-0.15, 0.15, -0.1);
            rightWhiskers.position.set(0.15, 0.15, -0.1);
            
            this.fpPaws.add(leftWhiskers);
            this.fpPaws.add(rightWhiskers);
        }

        buildPixelCat() {
            const s = 0.08; // Voxel size
            const mats = {
                o: new THREE.MeshStandardMaterial({ color: 0xffaa55 }), // Soft Orange
                w: new THREE.MeshStandardMaterial({ color: 0xffffff }), // White
                b: new THREE.MeshStandardMaterial({ color: 0x8B4513 }), // Brown spots
                p: new THREE.MeshStandardMaterial({ color: 0xffb6c1 }), // Pink
                k: new THREE.MeshStandardMaterial({ color: 0x222222 })  // Dark Grey/Black
            };
            
            const geom = new THREE.BoxGeometry(s, s, s);
            const catGroup = new THREE.Group();

            const addVoxel = (x, y, z, c) => {
                const mesh = new THREE.Mesh(geom, mats[c]);
                mesh.position.set(x * s, y * s, z * s);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                catGroup.add(mesh);
            };

            // Constructing the cat from voxels
            // Game moves towards -Z. Player faces -Z. Butt faces +Z.
            
            const voxels = [
                // -- TORSO --
                // Center Body (3x3x4)
                // Bottom Layer
                {x:0,y:0,z:0,c:'w'}, {x:1,y:0,z:0,c:'w'}, {x:-1,y:0,z:0,c:'w'},
                {x:0,y:0,z:1,c:'w'}, {x:1,y:0,z:1,c:'w'}, {x:-1,y:0,z:1,c:'w'},
                {x:0,y:0,z:-1,c:'w'}, {x:1,y:0,z:-1,c:'w'}, {x:-1,y:0,z:-1,c:'w'},

                // Mid Layer
                {x:0,y:1,z:0,c:'o'}, {x:1,y:1,z:0,c:'o'}, {x:-1,y:1,z:0,c:'o'},
                {x:0,y:1,z:1,c:'o'}, {x:1,y:1,z:1,c:'b'}, {x:-1,y:1,z:1,c:'o'}, // Spot near back
                {x:0,y:1,z:-1,c:'o'}, {x:1,y:1,z:-1,c:'o'}, {x:-1,y:1,z:-1,c:'o'},

                // Top Layer
                {x:0,y:2,z:0,c:'o'}, {x:1,y:2,z:0,c:'o'}, {x:-1,y:2,z:0,c:'o'},
                {x:0,y:2,z:1,c:'o'}, {x:1,y:2,z:1,c:'o'}, {x:-1,y:2,z:1,c:'b'}, // Spot
                {x:0,y:2,z:-1,c:'o'}, {x:1,y:2,z:-1,c:'o'}, {x:-1,y:2,z:-1,c:'o'},

                // -- LEGS --
                {x:-1,y:-1,z:1,c:'w'}, {x:1,y:-1,z:1,c:'w'}, // Back
                {x:-1,y:-1,z:-1,c:'w'}, {x:1,y:-1,z:-1,c:'w'}, // Front

                // -- HEAD (Front is -Z) --
                // 3x3 box at front
                {x:0,y:2,z:-2,c:'o'}, {x:1,y:2,z:-2,c:'o'}, {x:-1,y:2,z:-2,c:'o'},
                {x:0,y:3,z:-2,c:'o'}, {x:1,y:3,z:-2,c:'o'}, {x:-1,y:3,z:-2,c:'o'},
                
                // Face Features (on -Z face)
                {x:-0.8,y:2.5,z:-2.2,c:'k'}, {x:0.8,y:2.5,z:-2.2,c:'k'}, // Eyes
                {x:0,y:2.2,z:-2.2,c:'p'}, // Nose

                // Ears
                {x:-1,y:3.5,z:-2,c:'o'}, {x:1,y:3.5,z:-2,c:'o'},

                // -- BUTT (Back is +Z) --
                // "Cute Butt" - The most important part
                {x:-0.5,y:1,z:1.5,c:'w'}, {x:0.5,y:1,z:1.5,c:'w'}, // Cheeks protruding
                {x:0,y:0.8,z:1.5,c:'p'}, // *

                // Tail (Curled up)
                {x:0,y:2,z:1.5,c:'o'}, 
                {x:0,y:2.5,z:1.8,c:'w'} // Tip
            ];

            voxels.forEach(v => addVoxel(v.x, v.y, v.z, v.c));
            
            // Apply offset and scale to the inner group
            catGroup.position.y = -0.3;
            catGroup.scale.set(2, 2, 2); 

            this.playerMesh.add(catGroup);
        }

        createBlock(x, y, z, w, h, d, color) {
            // Visual
            const mesh = new THREE.Mesh(
                new THREE.BoxGeometry(w, h, d),
                new THREE.MeshStandardMaterial({ color })
            );
            mesh.position.set(x, y, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            this.scene.add(mesh);
            this.mapMeshes.push(mesh);

            // Physics
            const body = new CANNON.Body({ mass: 0, material: this.matGround });
            body.addShape(new CANNON.Box(new CANNON.Vec3(w / 2, h / 2, d / 2)));
            body.position.set(x, y, z);
            this.world.addBody(body);
            this.mapBodies.push(body);
        }

        createLevel() {
            // Floor
            this.createBlock(0, -1, -1000, 30, 2, 2000, this.config.COLORS.GROUND);

            // Obstacles
            for (let i = 0; i < 150; i++) {
                const z = -20 - (i * 15);
                const x = (Math.random() * 20) - 10;
                if (Math.random() > 0.5) {
                    this.createBlock(x, 0.5, z, 5, 1, 1, this.config.COLORS.OBSTACLE_1);
                } else {
                    this.createBlock(x, 1.5, z, 2, 3, 2, this.config.COLORS.OBSTACLE_2);
                }
            }
        }

        initInput() {
            window.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    this.attemptJump();
                    this.keys.jump = true; // Keep for state if needed
                }
                if (e.code === 'ArrowLeft' || e.code === 'KeyA') this.keys.left = true;
                if (e.code === 'ArrowRight' || e.code === 'KeyD') this.keys.right = true;
                if (e.code === 'ArrowUp' || e.code === 'KeyW') this.keys.forward = true;
                if (e.code === 'KeyV') this.toggleView();
            });
            window.addEventListener('keyup', (e) => {
                if (e.code === 'Space') this.keys.jump = false;
                if (e.code === 'ArrowLeft' || e.code === 'KeyA') this.keys.left = false;
                if (e.code === 'ArrowRight' || e.code === 'KeyD') this.keys.right = false;
                if (e.code === 'ArrowUp' || e.code === 'KeyW') this.keys.forward = false;
            });
        }

        attemptJump() {
            if (this.jumpCount < this.maxJumps) {
                this.playerBody.velocity.y = this.config.JUMP_FORCE;
                this.jumpCount++;
                this.isGrounded = false;
            }
        }

        handleResize() {
            this.camera.aspect = window.innerWidth / window.innerHeight;
            this.camera.updateProjectionMatrix();
            this.renderer.setSize(window.innerWidth, window.innerHeight);
        }

        updatePhysics(dt) {
            this.world.step(1 / 60);

            // Boost Logic
            let currentSpeed = this.config.PLAYER_SPEED;
            let isBoosting = false;
            
            // Handle Exhaustion Recovery
            if (this.isExhausted) {
                this.stamina = Math.min(this.config.STAMINA_MAX, this.stamina + this.config.STAMINA_RECHARGE * dt);
                if (this.stamina >= this.config.STAMINA_RECOVERY_THRESHOLD) {
                    this.isExhausted = false;
                }
            } 
            // Active Boost
            else if (this.keys.forward && this.stamina > 0) {
                currentSpeed = this.config.BOOST_SPEED;
                isBoosting = true;
                this.stamina = Math.max(0, this.stamina - this.config.STAMINA_DRAIN * dt);
                if (this.stamina <= 0) {
                    this.isExhausted = true;
                }
            } 
            // Normal Recharge
            else {
                this.stamina = Math.min(this.config.STAMINA_MAX, this.stamina + this.config.STAMINA_RECHARGE * dt);
            }
            
            // Update Speed Effects
            this.updateSpeedEffects(isBoosting);

            this.playerBody.velocity.z = -currentSpeed;

            if (this.keys.left) this.playerBody.velocity.x -= 1.5;
            else if (this.keys.right) this.playerBody.velocity.x += 1.5;
            else this.playerBody.velocity.x *= 0.85;

            // Speed Limiting
            if (this.playerBody.velocity.x > this.config.LATERAL_SPEED) this.playerBody.velocity.x = this.config.LATERAL_SPEED;
            if (this.playerBody.velocity.x < -this.config.LATERAL_SPEED) this.playerBody.velocity.x = -this.config.LATERAL_SPEED;

            // Reset
            if (this.playerBody.position.y < -15) {
                this.playerBody.position.set(0, 3, 0);
                this.playerBody.velocity.set(0, 0, 0);
                this.score = 0;
                this.stamina = this.config.STAMINA_MAX; // Reset Stamina
                this.isExhausted = false;
                this.updateUI();
            }
        }

        updateSpeedEffects(isBoosting) {
            if (isBoosting) {
                // Blur + Dizzy Color Shift at edges
                // Increased blur (12px) and reduced saturation (10%) for a "fading/dizzy" look
                const blurAmount = 'blur(12px) saturate(10%)';
                this.speedEffectContainer.style.backdropFilter = blurAmount;
                this.speedEffectContainer.style.webkitBackdropFilter = blurAmount;
                
                // FOV Increase
                this.camera.fov = THREE.MathUtils.lerp(this.camera.fov, 120, 0.1);
            } else {
                const resetEffect = 'blur(0px) saturate(100%)';
                this.speedEffectContainer.style.backdropFilter = resetEffect;
                this.speedEffectContainer.style.webkitBackdropFilter = resetEffect;
                
                this.camera.fov = THREE.MathUtils.lerp(this.camera.fov, 100, 0.1);
            }
            this.camera.updateProjectionMatrix();
        }

        updateCamera(time) {
            // First Person Only
            const pPos = this.playerMesh.position;
            
            // Position camera at "eyes" (approx)
            // Move camera forward to clear the head (-Z direction)
            const fpOffset = new THREE.Vector3(0, 0.6, -2.0); 
            const headBob = this.isGrounded ? Math.sin(time * 18) * 0.05 : 0;

            this.camera.position.set(
                pPos.x + fpOffset.x,
                pPos.y + fpOffset.y + headBob,
                pPos.z + fpOffset.z
            );
            
            // Look forward (-Z)
            this.camera.lookAt(
                this.camera.position.x, 
                this.camera.position.y, 
                this.camera.position.z - 10
            );
            
            // Paw Animation
            this.fpPaws.position.copy(this.camera.position);
            this.fpPaws.rotation.copy(this.camera.rotation);

            // Realistic Running Movement
            if (this.isGrounded) {
                    const bobSpeed = 16; 
                    const bounceAmp = 0.04; // Subtle bounce
                    const sideShift = 0.02; // Slight side-to-side
                    
                    // Subtle bobbing animation - paws stay mostly visible at bottom
                    const phase = time * bobSpeed;
                    const leftBounce = Math.sin(phase) * bounceAmp;
                    const rightBounce = Math.sin(phase + Math.PI) * bounceAmp;
                    
                    // Keep paws at bottom of view with subtle movement
                    this.leftLeg.position.y = -0.65 + leftBounce;
                    this.leftLeg.position.x = -0.15 + Math.sin(phase) * sideShift;
                    this.leftLeg.rotation.x = Math.sin(phase) * 0.15; // Slight tilt
                    
                    this.rightLeg.position.y = -0.65 + rightBounce;
                    this.rightLeg.position.x = 0.15 + Math.sin(phase + Math.PI) * sideShift;
                    this.rightLeg.rotation.x = Math.sin(phase + Math.PI) * 0.15;

            } else {
                // Jumping pose - paws stay visible, slightly higher
                this.leftLeg.position.y = THREE.MathUtils.lerp(this.leftLeg.position.y, -0.6, 0.1);
                this.rightLeg.position.y = THREE.MathUtils.lerp(this.rightLeg.position.y, -0.6, 0.1);
                
                // Slight spread
                this.leftLeg.position.x = THREE.MathUtils.lerp(this.leftLeg.position.x, -0.18, 0.1);
                this.rightLeg.position.x = THREE.MathUtils.lerp(this.rightLeg.position.x, 0.18, 0.1);
                
                this.leftLeg.rotation.x = THREE.MathUtils.lerp(this.leftLeg.rotation.x, 0.2, 0.1);
                this.rightLeg.rotation.x = THREE.MathUtils.lerp(this.rightLeg.rotation.x, 0.2, 0.1);
            }

            // Common Effects (Roll & Shake)
            if (this.camRoll === undefined) this.camRoll = 0;
            let targetCamRoll = -this.playerBody.velocity.x * 0.005;
            
            // Add "Dizzy/Broken" Shake when boosting (high fov)
            if (this.camera.fov > 105) {
                // Random jitter
                targetCamRoll += (Math.random() - 0.5) * 0.1; 
                this.camera.position.x += (Math.random() - 0.5) * 0.05;
                this.camera.position.y += (Math.random() - 0.5) * 0.05;
            }

            this.camRoll = THREE.MathUtils.lerp(this.camRoll, targetCamRoll, 0.1);
            this.camera.rotation.z = this.camRoll;
        }

        updateUI() {
            document.getElementById('score').innerText = this.score + "m";
            if (this.score > this.highScore) {
                this.highScore = this.score;
                document.getElementById('sub-score').innerText = "Best: " + this.highScore + "m";
            }
            
            // Stamina Bar Update
            const staminaPercent = (this.stamina / this.config.STAMINA_MAX) * 100;
            const bar = document.getElementById('stamina-bar');
            bar.style.width = staminaPercent + "%";
            
            // Change color based on stamina level
            if (this.isExhausted) {
                 bar.style.backgroundColor = "#555555"; // Gray when exhausted
            } else if (staminaPercent < 20) {
                 bar.style.backgroundColor = "#ff4757";
            } else if (staminaPercent < 50) {
                 bar.style.backgroundColor = "#ffd700";
            } else {
                 bar.style.backgroundColor = "#00ff00";
            }
        }

        animate() {
            requestAnimationFrame(() => this.animate());

            const dt = this.clock.getDelta();
            const time = this.clock.getElapsedTime();

            this.updatePhysics(dt);

            // Sync Visuals
            this.playerMesh.position.copy(this.playerBody.position);

            if (this.isGrounded) {
                this.playerMesh.position.y += Math.sin(time * 20) * 0.05;
            }

            // Dynamic Turning Visuals (Yaw & Roll)
            const smoothing = 0.15;
            
            // Yaw: Face the direction of movement (relative to -Z)
            const targetYaw = Math.atan(this.playerBody.velocity.x / this.playerBody.velocity.z);
            this.playerMesh.rotation.y = THREE.MathUtils.lerp(this.playerMesh.rotation.y, targetYaw, smoothing);

            // Roll: Bank into turns
            const targetRoll = -this.playerBody.velocity.x * 0.05;
            this.playerMesh.rotation.z = THREE.MathUtils.lerp(this.playerMesh.rotation.z, targetRoll, smoothing);

            this.updateCamera(time);

            // Score
            const dist = Math.floor(Math.abs(this.playerBody.position.z));
            if (dist > this.score) {
                this.score = dist;
            }
            this.updateUI(); // Always update UI for stamina bar

            this.renderer.render(this.scene, this.camera);
        }
    }

    // Initialize
    new MeowRunGame();

</script>
</body>
</html>
